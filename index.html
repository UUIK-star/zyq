<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZYQ · 个人作品集</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 导航 -->
  <header class="site-header">
    <a href="#" class="logo">ZYQ</a>
    <button class="menu-btn" id="menuBtn" aria-label="打开菜单">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav" id="siteNav">
      <a href="#hero">首页</a>
      <a href="#works">作品</a>
      <a href="mailto:hello@example.com">联系</a>
    </nav>
  </header>

  <main class="snap-container">
    <!-- 第一页：重力互动引言 -->
    <section class="page hero-page" id="hero">
      <div class="hero-bg">
        <img src="images/网站首页虚化背景图.jpg" alt="" aria-hidden="true">
      </div>

      <div class="hero-content codrops_mwg">
        <h1 class="hero-title">
          <span>欢迎来到 ZYQ 的</span>
          <span>个人作品集网站，哈哈哈哈</span>
        </h1>
        <p class="hero-hint">移动鼠标，释放重力</p>

        <div class="medias" aria-hidden="true">
          <img src="images/小图标1.jpg" alt="" data-shape="circle">
          <img src="images/小图标2.jpg" alt="" data-shape="heart">
          <img src="images/小图标4.jpg" alt="" data-shape="star">
          <img src="images/小图标5.jpg" alt="" data-shape="circle">
          <img src="images/小图标6.jpg" alt="" data-shape="heart">
        </div>
      </div>

      <div class="scroll-hint">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="7" y="2" width="10" height="16" rx="5" stroke="currentColor" stroke-width="1.5"/>
          <line x1="12" y1="6" x2="12" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>向下滑动探索作品</span>
      </div>
    </section>

    <!-- 第二页：3D 卡片轮播 (跳转B站) -->
    <section class="page works-page" id="works">
      <div class="works-header">
        <p class="works-label">VIDEO PLAYLIST</p>
        <h2 class="works-title">视频作品库</h2>
      </div>

      <div class="carousel-stage">
        <div class="carousel-track">
          <div class="carousel-ring" id="carouselRing">
            <!-- 卡片1：营养快线广告 -->
            <article class="video-card" data-index="0">
              <a href="https://www.bilibili.com/video/BV1qKJK6wEUx/" target="_blank" rel="noopener noreferrer">
                <div class="card-inner">
                  <img src="images/cover1.jpg" alt="营养快线 30s 广告封面" class="card-cover">
                  <div class="bilibili-icon"></div>
                  <div class="card-overlay">
                    <span class="card-title">营养快线 30s 广告</span>
                  </div>
                </div>
              </a>
            </article>

            <!-- 卡片2：三福广告 -->
            <article class="video-card" data-index="1">
              <a href=" https://www.bilibili.com/video/BV17KJK6wEhr/" target="_blank" rel="noopener noreferrer">
                <div class="card-inner">
                  <img src="images/cover2.jpg" alt="三福 30s 广告封面" class="card-cover">
                  <div class="bilibili-icon"></div>
                  <div class="card-overlay">
                    <span class="card-title">三福 30s 广告</span>
                  </div>
                </div>
              </a>
            </article>

            <!-- 卡片3：纳爱斯广告 -->
            <article class="video-card" data-index="2">
              <a href="https://www.bilibili.com/video/BV1jKJK6wEDM/" target="_blank" rel="noopener noreferrer">
                <div class="card-inner">
                  <img src="images/cover3.jpg" alt="纳爱斯 30s 广告封面" class="card-cover">
                  <div class="bilibili-icon"></div>
                  <div class="card-overlay">
                    <span class="card-title">纳爱斯 30s 广告</span>
                  </div>
                </div>
              </a>
            </article>

            <!-- 卡片4：三九胃泰比赛视频 -->
            <article class="video-card" data-index="3">
              <a href=" https://www.bilibili.com/video/BV1jKJK6wEQe/" target="_blank" rel="noopener noreferrer">
                <div class="card-inner">
                  <img src="images/cover4.jpg" alt="三九胃泰比赛视频封面" class="card-cover">
                  <div class="bilibili-icon"></div>
                  <div class="card-overlay">
                    <span class="card-title">三九胃泰比赛视频</span>
                  </div>
                </div>
              </a>
            </article>

            <!-- 卡片5：青春的海 -->
            <article class="video-card" data-index="4">
              <a href=" https://www.bilibili.com/video/BV17KJK6wEJ3/" target="_blank" rel="noopener noreferrer">
                <div class="card-inner">
                  <img src="images/cover5.jpg" alt="微短片《青春的海》封面" class="card-cover">
                  <div class="bilibili-icon"></div>
                  <div class="card-overlay">
                    <span class="card-title">微短片《青春的海》</span>
                  </div>
                </div>
              </a>
            </article>

            <!-- 卡片6：AI漫剧 -->
            <article class="video-card" data-index="5">
              <a href="https://www.bilibili.com/video/BV17KJK6wEpq/" target="_blank" rel="noopener noreferrer">
                <div class="card-inner">
                  <img src="images/cover6.jpg" alt="AI 漫剧作品封面" class="card-cover">
                  <div class="bilibili-icon"></div>
                  <div class="card-overlay">
                    <span class="card-title">AI 漫剧作品</span>
                  </div>
                </div>
              </a>
            </article>
          </div>
          <div class="carousel-floor" aria-hidden="true"></div>
        </div>
      </div>

      <div class="controls-bar">
        <button class="ctrl-btn" id="prevBtn" aria-label="上一个">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn ctrl-btn--main" id="playBtn" aria-label="播放/暂停">
          <svg class="icon-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>
        </button>
        <button class="ctrl-btn" id="nextBtn" aria-label="下一个">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-11 6l8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn" id="muteBtn" aria-label="声音开关">
          <svg class="icon-unmuted" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          <svg class="icon-muted" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        </button>
        <button class="ctrl-btn" id="fullscreenBtn" aria-label="全屏">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
      </div>

      <p class="role-tags">导演 / 策划 / 分镜 / 拍摄 / 剪辑后期</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
